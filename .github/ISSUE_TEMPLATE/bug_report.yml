name: Bug Report
description: Report a bug or issue
title: "[BUG] "
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information (screenshots, logs, etc.)

  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - "Phase 0: Foundation"
        - "Phase 1: Inventory"
        - "Phase 2: Customers"
        - "Phase 3: Jobs"
        - "Phase 4: Invoicing"
        - "Phase 5: Roles"
        - "Phase 6: Reports"
        - "Phase 7: Discord"
        - "Phase 8: Launch"
