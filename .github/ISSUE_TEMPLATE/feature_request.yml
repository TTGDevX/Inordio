name: Feature Request
description: Suggest a new feature
title: "[FEATURE] "
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the sections below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: As a [user type], I want to [do something] so that [benefit]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - "Phase 0: Foundation"
        - "Phase 1: Inventory"
        - "Phase 2: Customers"
        - "Phase 3: Jobs"
        - "Phase 4: Invoicing"
        - "Phase 5: Roles"
        - "Phase 6: Reports"
        - "Phase 7: Discord"
        - "Phase 8: Launch"
        - "Future / Post-Launch"

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "Low - Nice to have"
        - "Medium - Should have"
        - "High - Must have"
        - "Critical - Blocking"
